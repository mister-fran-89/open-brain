
services:
  open-brain:
    build: .
    container_name: open-brain
    ports:
      - "8000:8000"
    volumes:
      - /opt/open-brain/vault:/vault
      - /opt/open-brain/data:/data
    env_file:
      - .env
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8002:8000"
    volumes:
      - /opt/open-brain/data/chroma:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper
    ports:
      - "8001:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-base}
    restart: unless-stopped

  brain-web:
    build: ./web
    container_name: brain-web
    environment:
      - BRAIN_URL=http://open-brain:8000
      - WHISPER_URL=http://whisper:8000
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    ports:
      - "8010:8080"
    depends_on:
      - open-brain
      - whisper
    restart: unless-stopped
